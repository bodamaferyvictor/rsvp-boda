<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmación de Asistencia</title>

<style>
body{
    font-family: Georgia, serif;
    background:#f9f8f5;
    text-align:center;
    padding:40px;
}

.contenedor{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
    color:#5b6d8a;
}

select, button{
    padding:12px;
    margin-top:15px;
    width:100%;
    max-width:300px;
}

button{
    background:#5b6d8a;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#mensaje{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="contenedor">

<h1>Boda de</h1>
    
<h2>Mafer & Víctor</h2>

<h2 id="nombre"></h2>
    
<p id="pases"></p>

<label>¿Cuántas personas asistirán?</label><br>

<select id="asistentes"></select>

<br><br>

<button onclick="confirmar()">
Confirmar asistencia
</button>

<p id="mensaje"></p>

</div>

<script>

let invitados = {};

fetch('invitadosboda.csv')
.then(response => response.text())
.then(data => {

    const filas = data.trim().split('\n');
    console.log(columnas);

    for(let i = 1; i < filas.length; i++){

        const columnas = filas[i].split(',');

        invitados[columnas[0].trim()] = {
            nombre: columnas[1].trim(),
            pases: parseInt(columnas[2])
        };
    }

    cargarInvitado();
});

function cargarInvitado(){

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if(invitados[id]){

        document.getElementById("nombre").innerText =
        invitados[id].nombre;

        document.getElementById("pases").innerText =
        "Hemos reservado " +
        invitados[id].pases +
        " lugar(es) en su honor.";

        const select =
        document.getElementById("asistentes");

        select.innerHTML = "";

        for(let i = 0; i <= invitados[id].pases; i++){

            const option =
            document.createElement("option");

            option.value = i;
            option.text = i;

            select.appendChild(option);
        }

    }else{

        document.getElementById("nombre").innerText =
        "Invitación no encontrada";

        document.getElementById("pases").innerText = "";
    }
}

function confirmar(){

    const cantidad =
    document.getElementById("asistentes").value;

    document.getElementById("mensaje").innerHTML =
    "¡Gracias! Confirmaste " +
    cantidad +
    " asistente(s).";
}

</script>

</body>
</html>
