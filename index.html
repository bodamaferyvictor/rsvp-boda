<script>

let invitados = {};

fetch('invitadosboda.csv')
.then(r => r.text())
.then(data => {

    const filas = data.trim().split('\n');

    for(let i = 1; i < filas.length; i++){

        // 🔥 ESTA ES LA CLAVE (detecta cualquier separador)
        const columnas = filas[i].split(/[\t,;]/);

        const id = columnas[0]?.trim();
        const nombre = columnas[1]?.trim();
        const pases = parseInt(columnas[2]?.trim());

        if(id){
            invitados[id] = {
                nombre: nombre || "Sin nombre",
                pases: isNaN(pases) ? 0 : pases
            };
        }
    }

    iniciar();
});

function iniciar(){

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const invitado = invitados[id];

    if(!invitado){

        document.getElementById("nombre").innerText =
        "Invitación no encontrada";

        document.getElementById("pases").innerText = "";
        return;
    }

    document.getElementById("nombre").innerText = invitado.nombre;

    document.getElementById("pases").innerText =
    "Hemos reservado " + invitado.pases + " lugar(es) para ti 💍";

    const select = document.getElementById("asistentes");
    select.innerHTML = "";

    for(let i = 0; i <= invitado.pases; i++){

        let option = document.createElement("option");
        option.value = i;
        option.text = i;
        select.appendChild(option);
    }
}

function confirmar(){

    const cantidad = document.getElementById("asistentes").value;

    document.getElementById("mensaje").innerHTML =
    "¡Gracias! Confirmaste " + cantidad + " asistente(s) 💕";
}

</script>
